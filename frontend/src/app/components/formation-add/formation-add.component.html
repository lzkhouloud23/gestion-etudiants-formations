<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow">
        <div class="card-header bg-warning">
          <h4 class="mb-0">➕ Ajouter une Formation</h4>
        </div>
        <div class="card-body">
          <form [formGroup]="formValue" (ngSubmit)="onSubmit()">

            <div class="mb-3">
              <label class="form-label fw-semibold">Titre *</label>
              <input formControlName="titre" type="text" class="form-control"
                [class.is-invalid]="submitted && titre?.invalid"
                placeholder="Ex: Licence Informatique" />
              <div class="invalid-feedback">Le titre est obligatoire.</div>
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold">Niveau *</label>
              <select formControlName="niveau" class="form-select">
                <option *ngFor="let n of niveaux" [value]="n">{{ n }}</option>
              </select>
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold">Département</label>
              <input formControlName="departement" type="text"
                class="form-control"
                placeholder="Ex: Informatique" />
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold">Description</label>
              <textarea formControlName="description" class="form-control"
                rows="3" placeholder="Description..."></textarea>
            </div>

            <div class="d-flex gap-2 mt-3">
              <button type="submit" class="btn btn-warning">✅ Enregistrer</button>
              <a routerLink="/formations" class="btn btn-outline-secondary">❌ Annuler</a>
            </div>

          </form>
        </div>
      </div>
    </div>
  </div>
</div>
